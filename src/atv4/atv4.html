<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cálculo de lucro líquido</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <div class="painel">
    <h3>Cálculo de lucro líquido</h3>

    <label>Preço de venda:</label>
    <input type="number" id="venda" placeholder="Digite o preço de venda">

    <label>Custo do produto:</label>
    <input type="number" id="custo" placeholder="Digite o custo do produto">

    <label>Custos operacionais:</label>
    <input type="number" id="custos" placeholder="Digite os custos operacionais">

    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>
  </div>

  <script src="atv4.js"></script>
</body>
</html>

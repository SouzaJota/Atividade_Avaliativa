<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Preço</title>
    <link rel="stylesheet" href="../styles.css">
    
</head>
<body>
    <div class="painel">
        <h3>Cálculo de preço com margem de lucro
</h3>
        <label for="preco">Preço de custo:</label>
        <input type="number" id="preco" placeholder="Digite o preço de custo">
        <label for="margem">Margem de lucro (%):</label>
        <input type="number" id="margem" placeholder="Digite a margem de lucro">
        <button onclick="calcular()">Calcular</button>
        <p id="resultado"></p>
    </div>    
    <script src="./atv1.js"></script>
</body>
</html>

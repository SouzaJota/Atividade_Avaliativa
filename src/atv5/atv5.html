<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cálculo de ROI</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="painel">
        <h3>Cálculo de ROI</h3>
        
        <label for="investimento">Valor Investido (R$):</label>
        <input type="number" id="investimento" placeholder="Ex: 1000.00">
        
        <label for="receita">Receita Obtida (R$):</label>
        <input type="number" id="receita" placeholder="Ex: 1500.00">
        
        <button id="btnCalcularROI">Calcular ROI</button>
    
        <div id="resultadoROI" style="display: none;">
            <div id="textoROI"></div>
        </div>
    </div>
    <script src="atv5.js"></script>
</body>
</html>
